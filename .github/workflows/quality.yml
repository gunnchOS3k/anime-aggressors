name: Quality

on:
  push:
    branches: [main, revive-product-rollback-vertical-slice, fix-ci-expand-full-completion-roadmap, fix-pages-artifact-node24]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm run audit:ci

  native-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure native engine
        run: cmake -S native/engine -B build/native-engine -DCMAKE_BUILD_TYPE=Release

      - name: Build native engine
        run: cmake --build build/native-engine --config Release

      - name: Run native tests
        run: ctest --test-dir build/native-engine --output-on-failure

  firmware-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Firmware compile status (non-blocking)
        run: |
          echo "Firmware compile not gated yet — see firmware/ring/README.md"
          test -f firmware/ring/platformio.ini
