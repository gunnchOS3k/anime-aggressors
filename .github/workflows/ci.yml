name: ci
on: [push, pull_request]
jobs:
  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
        working-directory: ${{ github.workspace }}
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
