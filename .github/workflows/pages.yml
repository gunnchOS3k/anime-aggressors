name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quality gate
        run: npm run quality

      - name: Build Pages app
        run: npm run build:pages

      - name: Assert artifact is current app
        run: |
          test -f apps/web/dist/index.html
          test -f apps/web/dist/404.html
          test -f apps/web/dist/deploy-info.txt
          grep -q "Play Match" apps/web/dist/index.html
          grep -q "Impact Dummy Derby" apps/web/dist/index.html
          ! grep -q "Load Mini-Games" apps/web/dist/index.html
          cat apps/web/dist/deploy-info.txt

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
