name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Godot CLI and export templates
        run: |
          chmod +x scripts/install-godot-ci.sh scripts/install-godot-templates.sh
          GODOT_BIN="$(bash scripts/install-godot-ci.sh)"
          if [ ! -x "$GODOT_BIN" ]; then
            echo "Godot binary not executable: $GODOT_BIN"
            exit 1
          fi
          printf 'GODOT_BIN=%s\n' "$GODOT_BIN" >> "$GITHUB_ENV"
          "$GODOT_BIN" --version
          bash scripts/install-godot-templates.sh

      - name: Export Godot Web build
        run: npm run godot:export:web

      - name: Assert exported public Godot artifact
        run: GODOT_EXPORT_ROOT=apps/web/public/godot npm run assert:godot-export

      - name: Validate Godot cache busting and fighter quality
        run: |
          GODOT_EXPORT_ROOT=apps/web/public/godot npm run validate:godot-cache
          npm run validate:godot-fighters

      - name: Quality gate
        run: npm run quality

      - name: Build Pages app
        run: npm run build:web && npm run assert:godot-export && npm run finalize:pages

      - name: Debug Pages artifact
        run: |
          echo "--- dist/godot ---"
          find apps/web/dist/godot -maxdepth 2 -type f -print | sort || true
          echo "--- public/godot ---"
          find apps/web/public/godot -maxdepth 2 -type f -print | sort || true
          cat apps/web/dist/deploy-info.txt || true

      - name: Assert Pages artifact exists
        run: |
          test -f apps/web/dist/index.html
          test -f apps/web/dist/404.html
          test -f apps/web/dist/deploy-info.txt
          test -f apps/web/dist/godot/index.html
          test -f apps/web/dist/godot/build-manifest.json
          test -f apps/web/dist/godot/rescue-runtime.js
          test -n "$(find apps/web/dist/godot/runtime -mindepth 2 -name 'index.html' -print -quit)"
          test -n "$(find apps/web/dist/godot/runtime -mindepth 2 -name '*.wasm' -print -quit)"
          test -n "$(find apps/web/dist/godot/runtime -mindepth 2 -name '*.pck' -print -quit)"
          test -n "$(find apps/web/dist/godot/runtime -mindepth 2 -name '*.js' -print -quit)"
          if grep -q "No export artifact is checked in yet" apps/web/dist/godot/index.html; then
            echo "Godot placeholder still deployed"
            exit 1
          fi
          if ! grep -q "AARescueRuntime" apps/web/dist/godot/index.html; then
            echo "Godot boot shell missing rescue runtime contract"
            exit 1
          fi
          if ! grep -q "runtime/" apps/web/dist/godot/index.html; then
            echo "Godot boot shell missing versioned runtime iframe"
            exit 1
          fi
          if grep -R "https://gunnchos3k.github.io/play" apps/web/dist; then
            echo "Found forbidden root play URL"
            exit 1
          fi
          if grep -R 'href="/play' apps/web/dist; then
            echo "Found forbidden href=/play link"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
