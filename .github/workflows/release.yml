name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run release:check
      - uses: actions/upload-artifact@v5
        with:
          name: web-dist-${{ github.ref_name }}
          path: apps/web/dist
      - name: Write validation snippet
        run: |
          echo "## Release ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Web dist artifact uploaded." >> $GITHUB_STEP_SUMMARY
